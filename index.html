<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Fest 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:1.5rem 1rem 2rem;background:#fff5f8;}
.page{width:100%;max-width:430px;}

.logo-header{background:#fff;border-radius:20px 20px 0 0;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:center;border-bottom:3px solid #C8006A;}
.logo-header img{height:60px;width:auto;object-fit:contain;}

.banner-wrap{position:relative;overflow:hidden;}
.banner-wrap img{width:100%;display:block;max-height:240px;object-fit:cover;object-position:top;}

.info-bar{background:linear-gradient(135deg,#C8006A,#8B0080);padding:0.85rem 1.25rem;display:flex;justify-content:space-between;gap:8px;}
.info-pill{display:flex;align-items:center;gap:5px;color:#fff;font-size:12px;font-weight:700;}
.info-pill i{font-size:15px;opacity:0.9;}

.form-section{background:#fff;border:1px solid #f0d0e0;border-radius:0 0 20px 20px;padding:1.5rem;box-shadow:0 8px 32px rgba(200,0,106,0.07);}
.form-heading{display:flex;align-items:center;gap:10px;margin-bottom:5px;}
.form-heading-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#C8006A,#8B0080);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.form-heading-icon i{color:#fff;font-size:18px;}
.form-title{font-family:'Baloo 2',cursive;font-weight:700;font-size:18px;color:#1a1a1a;}
.form-subtitle{font-size:13px;color:#888;margin-bottom:1.2rem;line-height:1.5;padding-left:46px;}
.divider{height:1px;background:#f5e0ec;margin:0 0 1.2rem;}

.field{margin-bottom:14px;}
.field label{display:flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;color:#999;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.3px;}
.field label i{font-size:14px;color:#C8006A;}
.field input{width:100%;padding:11px 14px;border:1.5px solid #f0d0e0;border-radius:10px;font-size:15px;font-family:'Nunito',sans-serif;background:#fff8fc;color:#1a1a1a;outline:none;transition:border-color 0.15s,background 0.15s;}
.field input:focus{border-color:#C8006A;background:#fff;}
.field input::placeholder{color:#ccc;}

.submit-btn{width:100%;padding:14px;background:linear-gradient(135deg,#C8006A,#8B0080);color:#fff;border:none;border-radius:12px;font-family:'Baloo 2',cursive;font-weight:800;font-size:18px;cursor:pointer;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 4px 16px rgba(200,0,106,0.35);transition:opacity 0.15s,transform 0.1s;}
.submit-btn:hover{opacity:0.92;}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{opacity:0.6;cursor:not-allowed;}

.success-box{display:none;text-align:center;padding:2.5rem 1rem 1.5rem;}
.success-icon{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#C8006A,#8B0080);display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem;box-shadow:0 4px 20px rgba(200,0,106,0.3);}
.success-icon i{color:#fff;font-size:34px;}
.success-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:24px;color:#1a1a1a;margin-bottom:8px;}
.success-msg{font-size:14px;color:#888;line-height:1.6;}
.success-badge{display:inline-flex;align-items:center;gap:6px;margin-top:16px;background:#fff0f7;border:1px solid #f5c0dc;border-radius:20px;padding:6px 16px;font-size:12.5px;font-weight:700;color:#C8006A;}

.footer{text-align:center;margin-top:1.2rem;}
.footer img{height:32px;width:auto;opacity:0.7;}
</style>
</head>

var submitted = false;
function formSubmitted() {
  if (submitted) {
    document.getElementById('formContent').style.display = 'none';
    document.getElementById('successBox').style.display = 'block';

}
function handleSubmit(e) {
  e.preventDefault();
  const name = document.getElementById('fname').value.trim();
  const phone = document.getElementById('fphone').value.trim();
  if (!name || !phone) { alert('Please fill in your name and phone number.'); return; }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<i class="ti ti-loader"></i> Saving...';
  submitted = true;
  document.getElementById('leadForm').submit();
}
